<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#03111F"/>
      <stop offset="45%" stop-color="#072445"/>
      <stop offset="100%" stop-color="#020814"/>
    </linearGradient>

    <radialGradient id="glowCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(600 108) rotate(90) scale(110 260)">
      <stop offset="0%" stop-color="#67D5FF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#2C8DFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2C8DFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wave1" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B3565"/>
      <stop offset="50%" stop-color="#1273FF"/>
      <stop offset="100%" stop-color="#0A2448"/>
    </linearGradient>

    <linearGradient id="wave2" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#071D38"/>
      <stop offset="50%" stop-color="#0D4DA1"/>
      <stop offset="100%" stop-color="#071D38"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#66B7FF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bgGrad)"/>
  <rect width="1200" height="260" rx="18" fill="url(#grid)"/>

  <ellipse cx="600" cy="108" rx="245" ry="88" fill="url(#glowCore)" filter="url(#softGlow)"/>

  <!-- subtle orbital rings -->
  <g opacity="0.34" stroke="#72C6FF" fill="none">
    <ellipse cx="600" cy="108" rx="150" ry="55" stroke-opacity="0.22"/>
    <ellipse cx="600" cy="108" rx="190" ry="70" stroke-opacity="0.15"/>
    <ellipse cx="600" cy="108" rx="230" ry="86" stroke-opacity="0.11"/>
  </g>

  <!-- HUD accents -->
  <g stroke="#7FD0FF" stroke-linecap="round" opacity="0.42">
    <path d="M120 62 H235" stroke-width="3"/>
    <path d="M965 62 H1080" stroke-width="3"/>
    <path d="M145 88 H205" stroke-width="2"/>
    <path d="M995 88 H1055" stroke-width="2"/>
    <circle cx="250" cy="62" r="4" fill="#7FD0FF"/>
    <circle cx="950" cy="62" r="4" fill="#7FD0FF"/>
  </g>

  <!-- decorative tech dots -->
  <g fill="#9BE1FF" opacity="0.7">
    <circle cx="198" cy="150" r="2.5"/>
    <circle cx="266" cy="128" r="1.8"/>
    <circle cx="932" cy="144" r="2.2"/>
    <circle cx="1008" cy="126" r="1.8"/>
    <circle cx="347" cy="74" r="1.8"/>
    <circle cx="852" cy="74" r="1.8"/>
  </g>

  <!-- name -->
  <g filter="url(#textGlow)">
    <text x="600" y="126" text-anchor="middle"
      font-family="Segoe UI, Orbitron, Arial, sans-serif"
      font-size="54" font-weight="800" letter-spacing="1"
      fill="#F5FBFF">Sascha Schmitt</text>
  </g>

  <!-- subtitle line -->
  <text x="600" y="156" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="15" font-weight="600" letter-spacing="4"
    fill="#8FD3FF" opacity="0.88">CYBERSECURITY • DEVELOPMENT • AUTOMATION</text>

  <!-- animated bottom waves -->
  <path fill="url(#wave2)" opacity="0.55">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="
      M0,184 C180,206 320,160 490,176 C640,190 760,222 920,208 C1045,198 1125,178 1200,186 L1200,260 L0,260 Z;
      M0,194 C170,176 330,210 490,196 C645,182 768,166 930,182 C1055,194 1132,212 1200,204 L1200,260 L0,260 Z;
      M0,184 C180,206 320,160 490,176 C640,190 760,222 920,208 C1045,198 1125,178 1200,186 L1200,260 L0,260 Z"/>
  </path>

  <path fill="url(#wave1)" opacity="0.90">
    <animate attributeName="d" dur="5.5s" repeatCount="indefinite"
      values="
      M0,192 C150,224 305,170 470,184 C625,197 742,231 900,216 C1038,204 1115,170 1200,178 L1200,260 L0,260 Z;
      M0,176 C155,162 300,210 468,202 C620,196 740,166 900,178 C1045,189 1120,220 1200,212 L1200,260 L0,260 Z;
      M0,192 C150,224 305,170 470,184 C625,197 742,231 900,216 C1038,204 1115,170 1200,178 L1200,260 L0,260 Z"/>
  </path>

  <path fill="#66C8FF" opacity="0.22">
    <animate attributeName="d" dur="4.2s" repeatCount="indefinite"
      values="
      M0,204 C165,188 315,224 476,214 C640,204 759,188 915,197 C1055,206 1135,197 1200,190 L1200,260 L0,260 Z;
      M0,198 C160,216 312,184 472,194 C638,204 760,220 918,211 C1062,202 1138,183 1200,188 L1200,260 L0,260 Z;
      M0,204 C165,188 315,224 476,214 C640,204 759,188 915,197 C1055,206 1135,197 1200,190 L1200,260 L0,260 Z"/>
  </path>

  <!-- frame -->
  <rect x="1" y="1" width="1198" height="258" rx="17" stroke="#6DBDFF" stroke-opacity="0.16" fill="none"/>
</svg>
