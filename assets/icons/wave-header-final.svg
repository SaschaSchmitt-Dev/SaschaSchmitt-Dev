<svg width="1200" height="190" viewBox="0 0 1200 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1200" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020B16"/>
      <stop offset="38%" stop-color="#06284D"/>
      <stop offset="100%" stop-color="#020814"/>
    </linearGradient>

    <radialGradient id="globeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(600 92) rotate(90) scale(84 250)">
      <stop offset="0%" stop-color="#9AEAFF" stop-opacity="0.96"/>
      <stop offset="28%" stop-color="#3FA2FF" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#2D8BFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#7BCBFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>

    <filter id="textGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <clipPath id="panelClip">
      <path d="M14,14 H1186 V154
               C1060,164 948,150 816,160
               C674,170 540,186 394,176
               C258,167 142,146 14,158
               V14 Z">
        <animate attributeName="d" dur="6s" repeatCount="indefinite"
          values="
          M14,14 H1186 V154
          C1060,164 948,150 816,160
          C674,170 540,186 394,176
          C258,167 142,146 14,158
          V14 Z;

          M14,14 H1186 V148
          C1066,140 952,170 818,164
          C676,158 544,146 396,154
          C260,162 144,172 14,164
          V14 Z;

          M14,14 H1186 V154
          C1060,164 948,150 816,160
          C674,170 540,186 394,176
          C258,167 142,146 14,158
          V14 Z"/>
      </path>
    </clipPath>
  </defs>

  <!-- frame lines -->
  <path d="M14 14 H1186 M14 14 V150 M1186 14 V150"
        stroke="#7FD1FF" stroke-opacity="0.24" stroke-width="1.5" fill="none"/>

  <g clip-path="url(#panelClip)">
    <rect x="14" y="14" width="1172" height="170" fill="url(#bgBase)"/>
    <rect x="14" y="14" width="1172" height="170" fill="url(#grid)"/>

    <!-- central globe / projection source -->
    <ellipse cx="600" cy="92" rx="252" ry="88" fill="url(#globeGlow)"/>

    <!-- globe rings -->
    <g opacity="0.30" stroke="#7AD1FF" fill="none">
      <ellipse cx="600" cy="92" rx="148" ry="52" stroke-opacity="0.24"/>
      <ellipse cx="600" cy="92" rx="186" ry="66" stroke-opacity="0.17"/>
      <ellipse cx="600" cy="92" rx="224" ry="80" stroke-opacity="0.10"/>
    </g>

    <!-- "Projections" inspired by your other background -->
    <g stroke="#83D5FF" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- left projection cluster -->
      <path d="M118 58 H236" stroke-width="3" stroke-opacity="0.40"/>
      <path d="M144 84 H208" stroke-width="2" stroke-opacity="0.34"/>
      <path d="M170 100 H230" stroke-width="2" stroke-opacity="0.22"/>
      <path d="M236 58 L324 92 L412 72" stroke-width="1.6" stroke-opacity="0.20"/>
      <path d="M208 84 L320 108 L430 96" stroke-width="1.2" stroke-opacity="0.14"/>

      <!-- right projection cluster -->
      <path d="M964 58 H1082" stroke-width="3" stroke-opacity="0.40"/>
      <path d="M992 84 H1056" stroke-width="2" stroke-opacity="0.34"/>
      <path d="M968 100 H1028" stroke-width="2" stroke-opacity="0.22"/>
      <path d="M964 58 L876 92 L788 72" stroke-width="1.6" stroke-opacity="0.20"/>
      <path d="M992 84 L880 108 L770 96" stroke-width="1.2" stroke-opacity="0.14"/>

      <!-- subtle diagonal projection lines -->
      <path d="M456 58 L520 78" stroke-width="1.4" stroke-opacity="0.12"/>
      <path d="M744 58 L680 78" stroke-width="1.4" stroke-opacity="0.12"/>
      <path d="M434 120 L500 108" stroke-width="1.2" stroke-opacity="0.10"/>
      <path d="M766 120 L700 108" stroke-width="1.2" stroke-opacity="0.10"/>
    </g>

    <!-- data nodes -->
    <g fill="#A8EAFF" filter="url(#softGlow)">
      <circle cx="250" cy="58" r="3.2" fill-opacity="0.90"/>
      <circle cx="214" cy="84" r="2.6" fill-opacity="0.82"/>
      <circle cx="234" cy="100" r="2.2" fill-opacity="0.58"/>
      <circle cx="950" cy="58" r="3.2" fill-opacity="0.90"/>
      <circle cx="986" cy="84" r="2.6" fill-opacity="0.82"/>
      <circle cx="966" cy="100" r="2.2" fill-opacity="0.58"/>
      <circle cx="334" cy="92" r="1.8" fill-opacity="0.50"/>
      <circle cx="866" cy="92" r="1.8" fill-opacity="0.50"/>
    </g>

    <!-- floating particles -->
    <g fill="#A4E7FF" opacity="0.70">
      <circle cx="206" cy="136" r="2.4"/>
      <circle cx="276" cy="114" r="1.8"/>
      <circle cx="922" cy="132" r="2.2"/>
      <circle cx="998" cy="116" r="1.8"/>
      <circle cx="344" cy="66" r="1.7"/>
      <circle cx="856" cy="66" r="1.7"/>
      <circle cx="434" cy="54" r="1.4"/>
      <circle cx="766" cy="54" r="1.4"/>
    </g>

    <!-- interior parallax sheen -->
    <path fill="#0E63D8" opacity="0.18">
      <animate attributeName="d" dur="8.5s" repeatCount="indefinite"
        values="
        M14,148 C138,140 250,155 384,152 C528,148 646,132 788,138 C930,144 1050,160 1186,152 L1186,184 L14,184 Z;
        M14,154 C138,162 250,144 384,146 C528,148 646,162 788,156 C930,150 1050,138 1186,144 L1186,184 L14,184 Z;
        M14,148 C138,140 250,155 384,152 C528,148 646,132 788,138 C930,144 1050,160 1186,152 L1186,184 L14,184 Z"/>
    </path>

    <path fill="#72D0FF" opacity="0.10">
      <animate attributeName="d" dur="4.2s" repeatCount="indefinite"
        values="
        M14,156 C146,148 262,166 396,162 C538,158 652,146 794,150 C938,154 1054,162 1186,156 L1186,184 L14,184 Z;
        M14,152 C146,162 262,150 396,154 C538,158 652,164 794,160 C938,156 1054,148 1186,150 L1186,184 L14,184 Z;
        M14,156 C146,148 262,166 396,162 C538,158 652,146 794,150 C938,154 1054,162 1186,156 L1186,184 L14,184 Z"/>
    </path>
  </g>

  <g filter="url(#textGlow)">
    <text x="600" y="108" text-anchor="middle"
      font-family="Segoe UI, Arial, sans-serif"
      font-size="54"
      font-weight="800"
      letter-spacing="1"
      fill="#F5FBFF">Sascha Schmitt</text>
  </g>
</svg>
